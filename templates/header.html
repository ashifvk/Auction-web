{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Control{% endblock %}</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <style>

        /* ---------------------------------------------------------
           GLOBAL THEME
        ---------------------------------------------------------- */
        :root {
            --bg-main: #0f172a;
            --card-bg: #1e293b;
            --card-bg-alt: #162033;
            --text-main: #f1f5f9;
            --text-soft: #94a3b8;
            --accent: #38bdf8;
            --accent-2: #818cf8;
            --danger: #ef4444;
            --success: #4ade80;
            --warning: #f59e0b;
            --border-light: rgba(255,255,255,0.08);
        }

        body {
            font-family: "Inter", sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            padding: 30px 18px;
        }

        h1 {
            font-family: "Space Grotesk";
            font-weight: 700;
            font-size: 2.4rem;
            color: var(--accent);
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* ---------------------------------------------------------
           CARDS
        ---------------------------------------------------------- */
        .control-section {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 22px;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            border: 1px solid var(--border-light);
            transition: 0.3s;
        }

        .control-section:hover {
            background: var(--card-bg-alt);
        }

        .control-section h2 {
            font-family: "Space Grotesk";
            font-size: 1.4rem;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 8px;
            margin-bottom: 18px;
        }

        .status-box {
            border-left: 4px solid var(--accent);
            background: rgba(56,189,248,0.08);
        }

        .current-bid {
            color: var(--success);
            font-size: 1.7rem;
            font-weight: 700;
        }

        /* ---------------------------------------------------------
           FORMS
        ---------------------------------------------------------- */
        select, input[type="number"] {
            background: #0f172a;
            color: var(--text-main);
            border: 1px solid var(--border-light);
            padding: 10px 14px;
            border-radius: 8px;
            width: 100%;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.25);
            outline: none;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-weight: 600;
            letter-spacing: .3px;
            color: white;
            transition: 0.25s;
            width: 100%;
        }

        button.primary { background: var(--accent); }
        button.primary:hover { background: #0ea5e9; }

        button.success { background: var(--success); }
        button.success:hover { background: #22c55e; }

        button.danger { background: var(--danger); }
        button.danger:hover { background: #dc2626; }

        /* ---------------------------------------------------------
           MESSAGES + TABLES
        ---------------------------------------------------------- */
        .message {
            background: rgba(239,68,68,0.12);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        table.summary-table {
            width: 100%;
            border-collapse: collapse;
        }

        .summary-table th {
            padding: 14px;
            background: #243144;
            font-size: 0.8rem;
            color: var(--text-soft);
        }

        .summary-table td {
            padding: 14px;
            border-bottom: 1px solid var(--border-light);
        }

        .summary-table tr:hover {
            background: #1a2436;
        }

    </style>

    {% block extra_head %}{% endblock %}
</head>

<body>

    <h1>{% block header %}{% endblock %}</h1>

    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    <!-- PAGE CONTENT -->
    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
