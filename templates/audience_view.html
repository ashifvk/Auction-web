{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ settings.title }} | {{ settings.auction_type }} Auction</title>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Space+Grotesk:wght@700;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --yg-primary: #6A1B9A;
            --yg-secondary: #9C27B0;
            --yg-accent: #E040FB;
            --yg-bg: #F7F4FA;
            --yg-card: #FFFFFF;
            --yg-border: #E6DFF0;
            --yg-text-main: #2E2A35;
            --yg-text-soft: #7A728A;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #5E178C, #8E24AA);
            font-family: 'Poppins', sans-serif;
        }

        /* ================= HEADER ================= */
        .auction-header {
            text-align: center;
            padding: 36px 20px 24px;
            color: #fff;
        }

        .auction-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.6rem;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .auction-subtitle {
            font-size: 1rem;
            opacity: .9;
            margin-top: 6px;
        }

        #status-message {
            margin-top: 14px;
            font-weight: 600;
            background: rgba(255, 255, 255, .15);
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
        }

        /* ================= CARD ================= */
        .auction-card {
            max-width: 1050px;
            margin: 0 auto 60px;
            background: var(--yg-card);
            border-radius: 22px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0, 0, 0, .25);
        }

        /* ================= PLAYER IMAGE ================= */
        .player-image {
            width: 320px;
            background: linear-gradient(180deg, #6A1B9A, #4A148C);
            padding: 32px 24px;
            text-align: center;
            color: #fff;
        }

        .player-image img {
            width: 190px;
            height: 250px;
            object-fit: cover;
            border-radius: 18px;
            border: 5px solid rgba(255, 255, 255, .25);
            margin-bottom: 18px;
            background: #fff;
        }

        .price-tag {
            background: #fff;
            color: var(--yg-primary);
            font-weight: 700;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: .95rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .15);
        }

        /* ================= PLAYER DETAILS ================= */
        .player-details {
            flex: 1;
            padding: 40px 44px;
        }

        #player-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.3rem;
            font-weight: 900;
            color: var(--yg-primary);
            margin-bottom: 26px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 34px;
        }

        .stat-box {
            background: #F4ECFA;
            color: var(--yg-text-main);
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            text-align: center;
            border: 1px solid var(--yg-border);
        }

        .stat-box span {
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 4px;
            color: var(--yg-secondary);
        }

        /* ================= BIDDING ================= */
        .bidding {
            display: flex;
            gap: 18px;
            margin-top: 10px;
        }

        .bid-box {
            flex: 1;
            background: linear-gradient(135deg, #6A1B9A, #9C27B0);
            color: #fff;
            padding: 18px;
            border-radius: 16px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            text-align: center;
            box-shadow: 0 16px 36px rgba(156, 39, 176, .45);
            letter-spacing: .5px;
        }

        /* ================= PREMIUM BUTTON ================= */
        .view-teams-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .view-teams-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.4);
        }

        .view-teams-btn:active {
            transform: translateY(0);
        }

        .view-teams-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }

        .view-teams-btn:hover svg {
            transform: translateX(3px);
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 992px) {
            .auction-card {
                flex-direction: column;
            }

            .player-image {
                width: 100%;
            }

            .player-details {
                padding: 32px;
            }

            .bidding {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <header class="auction-header">
        <a href="{% url 'team_profile' %}" class="view-teams-btn">
            View Teams
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </a>
        <div class="auction-title">{{ settings.title }}</div>
        <div class="auction-subtitle">{{ settings.auction_type }} Auction - Season 3</div>
        <div id="status-message">Auction Paused</div>
    </header>

    <section class="auction-card">

        <div class="player-image">
            <img id="player-photo" src="{% static 'images/player_placeholder.png' %}">
            <div class="price-tag" id="player-base-price">Base Price: ₹ 0</div>
        </div>

        <div class="player-details">

            <div id="player-name">Awaiting Player...</div>

            <div class="stats">
                <div class="stat-box">Position<span id="player-position">--</span></div>
                <div class="stat-box">Goals<span id="player-goals">0</span></div>
                <div class="stat-box">Assists<span id="player-assists">0</span></div>
                <div class="stat-box">Appearances<span id="player-appearances">0</span></div>
            </div>

            <div class="bidding">
                <div class="bid-box" id="current-bid-amount">CURRENT BID: ₹ 0</div>
                <div class="bid-box" id="bidding-team-highlight">BIDDING TEAM: N/A</div>
            </div>

        </div>
    </section>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 🔒 JS LOGIC UNCHANGED -->

        const PLAY_STYLES = [
            "Poacher", "Target Man", "Anchor Man", "Libero"
        ];
        function randomPlayStyle() {
            return PLAY_STYLES[Math.floor(Math.random() * PLAY_STYLES.length)];
        }
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' })
                .format(amount)
                .replace('₹', '₹ ');
        }

        function resetDisplay() {
            document.getElementById('player-name').textContent = 'Awaiting Player...';
            document.getElementById('player-photo').src = image_url;
            document.getElementById('player-base-price').textContent = 'Base Price: ₹ 0';
            document.getElementById('player-position').textContent = '--';
            document.getElementById('player-goals').textContent = '0';
            document.getElementById('player-assists').textContent = '0';
            document.getElementById('player-appearances').textContent = '0';
            document.getElementById('current-bid-amount').textContent = 'CURRENT BID: ₹ 0';
            document.getElementById('bidding-team-highlight').textContent = 'BIDDING TEAM: N/A';
            document.getElementById('status-message').style.display = 'block';
        }
        function updatePlayerCard(data) {
            document.getElementById('status-message').style.display = 'none';
            document.getElementById('player-name').textContent = data.name;
            if (data.photo_url) {
                document.getElementById('player-photo').src = data.photo_url;
            } else {
                document.getElementById('player-photo').src = image_url;
            }
            document.getElementById('player-base-price').textContent = `Base Price: ${formatCurrency(data.base_price)}`;
            document.getElementById('player-position').textContent = data.type ?? '--';
            document.getElementById('player-goals').textContent = data.goals ?? '0';
            document.getElementById('player-assists').textContent = data.assists ?? '0';
            document.getElementById('player-appearances').textContent = data.appearances ?? '0';
        }
        function updateBidInfo(data) {
            document.getElementById('current-bid-amount').textContent = `CURRENT BID: ${formatCurrency(data.bid_amount)}`;
            document.getElementById('bidding-team-highlight').textContent = `BIDDING TEAM: ${data.bid_team ?? 'N/A'}`;
        }
        const initialData = JSON.parse('{{ current_status_json|escapejs|default:"null" }}');
        if (initialData && initialData.is_active) {
            updatePlayerCard(initialData);
            updateBidInfo(initialData);
        } else {
            resetDisplay();
        }
        const wsScheme = window.location.protocol === "https:" ? "wss://" : "ws://";

        const socket = new WebSocket(wsScheme + window.location.host + '/ws/auction/');
        socket.onmessage = e => {
            const { action, data } = JSON.parse(e.data);
            if (action === 'new_player') {
                updatePlayerCard(data);
                updateBidInfo(data);
            }
            else if (action === 'bid_update') {
                updateBidInfo(data);
            }
            else if (action === 'player_sold') {
                document.getElementById('status-message').textContent =
                    `${data.player_name} SOLD to ${data.sold_to} for ${formatCurrency(data.price)} ⚽`;
                document.getElementById('status-message').style.display = 'block';
                setTimeout(resetDisplay, 7000);
            }
            else if (action === 'unsold') {
                document.getElementById('status-message').textContent = data.message;
                document.getElementById('status-message').style.display = 'block';
                setTimeout(resetDisplay, 4000);
            }
        };
    </script>
</body>

</html>
